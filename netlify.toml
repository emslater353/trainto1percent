[build]
  publish = "."

[functions]
  directory = "netlify/functions"

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

# Scheduled: weekly emails — runs every Monday at 6am EST (11:00 UTC)
[functions."weekly-emails"]
  schedule = "0 11 * * 1"


[[redirects]]
  from = "/company"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/diagnostic"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/google"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/claude"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/openai"
  to = "/app.html"
  status = 200
