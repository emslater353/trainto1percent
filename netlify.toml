[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  included_files = ["shared/**", "scripts/**"]

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

# Scheduled: weekly emails — runs every Monday at 6am EST (11:00 UTC)
[functions."weekly-emails"]
  schedule = "0 11 * * 1"

# Scheduled: pulse refresh — hourly (top of each hour UTC)
[functions."refresh-pulse"]
  schedule = "0 * * * *"
  timeout = 60

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/mobile"
  to = "/app.html?app=1"
  status = 200

[[redirects]]
  from = "/app"
  to = "/app.html?app=1"
  status = 200

[[redirects]]
  from = "/company"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/diagnostic"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/google"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/claude"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/openai"
  to = "/app.html"
  status = 200
